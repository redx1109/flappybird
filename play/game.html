<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="score">
        <span id="score">0</span>
    </div>
    <div id="popup" style="display: none;">
        <h2>Game Over!</h2>
        <p>Your score: <span id="final-score">0</span></p>
        <button onclick="restart()">Restart</button>
        <button onclick="window.location.href='../index.html'">Home</button>
    </div>
    <div id="rotate-msg" style="display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh; color:white; font-size:6vw; text-align:center; padding: 20px;">
    📱 Rotate your phone to landscape to play!
    </div>
    <canvas id="gamescreen"></canvas>
    <script src="game.js"></script>
</body>
</html>
